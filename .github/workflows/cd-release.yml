name: Submit to App Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      build_number:
        description: "빌드 번호 (비워두면 GitHub run number 사용)"
        required: false
        type: string

concurrency:
  group: cd-release
  cancel-in-progress: false

jobs:
  release:
    name: App Store 제출
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Create Secret.xcconfig
        env:
          API_URL: ${{ secrets.API_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_URL_SCHEME: ${{ secrets.GOOGLE_URL_SCHEME }}
        run: |
          mkdir -p Configuration
          cat > Configuration/Secret.xcconfig << EOF
          API_URL = ${API_URL}
          GOOGLE_CLIENT_ID = ${GOOGLE_CLIENT_ID}
          GOOGLE_URL_SCHEME = ${GOOGLE_URL_SCHEME}
          EOF

      - name: Convert API Key (PKCS#8 → 전통 EC 형식)
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          pip3 install cryptography --quiet --break-system-packages
          python3 << 'EOF'
          import os, base64
          from cryptography.hazmat.primitives.serialization import (
              load_pem_private_key, Encoding, PrivateFormat, NoEncryption
          )
          key_pem = base64.b64decode(os.environ["APP_STORE_CONNECT_API_KEY_CONTENT"])
          private_key = load_pem_private_key(key_pem, password=None)
          traditional = private_key.private_bytes(
              encoding=Encoding.PEM,
              format=PrivateFormat.TraditionalOpenSSL,
              encryption_algorithm=NoEncryption()
          )
          with open("/tmp/AuthKey.p8", "wb") as f:
              f.write(traditional)
          EOF

      - name: Tuist install (SPM 패키지)
        run: tuist install

      - name: Tuist generate
        run: tuist generate --no-open

      - name: Submit to App Store
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          DEVELOPER_PORTAL_TEAM_ID: ${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
        run: bundle exec fastlane release
