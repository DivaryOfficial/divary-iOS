name: Deploy to TestFlight (Internal)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: cd-internal
  cancel-in-progress: false

jobs:
  beta_internal:
    name: TestFlight 내부 테스트 배포
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Create Secret.xcconfig
        env:
          API_URL: ${{ secrets.API_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_URL_SCHEME: ${{ secrets.GOOGLE_URL_SCHEME }}
        run: |
          mkdir -p Configuration
          cat > Configuration/Secret.xcconfig << EOF
          API_URL = ${API_URL}
          GOOGLE_CLIENT_ID = ${GOOGLE_CLIENT_ID}
          GOOGLE_URL_SCHEME = ${GOOGLE_URL_SCHEME}
          EOF

      - name: Decode API Key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > /tmp/AuthKey_raw.p8
          brew install openssl@3 --quiet 2>/dev/null || true
          /opt/homebrew/opt/openssl@3/bin/openssl pkey -traditional \
            -in /tmp/AuthKey_raw.p8 -out /tmp/AuthKey.p8

      - name: Tuist install (SPM 패키지)
        run: tuist install

      - name: Tuist generate
        run: tuist generate --no-open

      - name: Deploy to TestFlight (Internal)
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_TEAM_ID: ${{ secrets.APP_STORE_CONNECT_TEAM_ID }}
          DEVELOPER_PORTAL_TEAM_ID: ${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane beta_internal
